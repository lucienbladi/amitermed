<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet"> <!-- Monster Font -->
    <style>
        body {
            background-color: #111;
            font-family: 'Arial', sans-serif;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            font-family: 'Bungee', cursive;
            font-size: 60px;
            color: #FF0000; /* Red for new account */
            margin-bottom: 30px;
            text-shadow: 3px 3px 10px rgba(255, 0, 0, 0.8); /* Red glow effect */
        }
        p {
            font-size: 18px;
            font-family: 'Verdana', sans-serif;
            color: #ccc;
            margin-top: 20px;
        }
        a {
            color: #00FFFF; /* Cyan */
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
        }
        a:hover {
            text-decoration: underline;
        }
        .button {
            background-color: #FF0000; /* Red for inactive */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            margin-top: 40px;
            display: inline-block;
            box-shadow: 0px 4px 10px rgba(255, 0, 0, 0.5);
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #CC0000; /* Darker red on hover */
        }
        .button:before {
            content: '\00D7'; /* Red X */
            font-size: 24px;
            margin-right: 8px;
        }
        .update-message {
            font-size: 16px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>NEW ACCOUNT > @lucienbladi2</h1> <!-- New account info -->
    <p><a href="https://guns.lol/lucien" target="_blank">https://guns.lol/lucien - Click this for Notable Information and Social Links here</a></p>
    <button class="button">Inactive</button> <!-- Inactive button with red X -->
    <p class="update-message">I got terminated off Discord, add my new account way above.</p> <!-- Update message -->
</body>
</html>
