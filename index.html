<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet"> <!-- Monster Font -->
    <style>
        body {
            background: url('https://wallpapers.com/images/featured-full/sakura-pc-xpjoihhwfmmleuiu.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent black */
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-family: 'Bungee', cursive;
            font-size: 24px;
            color: #FF0000; /* Red */
            margin-bottom: 10px;
            text-shadow: 3px 3px 10px rgba(255, 0, 0, 0.8); /* Red glow effect */
        }
        p {
            font-size: 14px;
            font-family: 'Verdana', sans-serif;
            color: #ccc;
            margin-top: 10px;
        }
        a {
            color: #00FFFF; /* Cyan */
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        a:hover {
            text-decoration: underline;
        }
        .button {
            background-color: #FF0000; /* Red for inactive */
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0px 4px 10px rgba(255, 0, 0, 0.5);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .button:hover {
            background-color: #CC0000; /* Darker red on hover */
            transform: translateY(-2px); /* Slight lift effect */
        }
        .button:before {
            content: '\00D7'; /* Red X */
            font-size: 16px;
            margin-right: 5px;
        }
        .update-message {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NEW ACCOUNT > @lucienbladi2</h1>
        <p><a href="https://guns.lol/lucien" target="_blank">https://guns.lol/lucien - Click this for Notable Information and Social Links here</a></p>
        <button class="button">Inactive</button> <!-- Inactive button -->
        <p class="update-message">I got terminated off Discord, add my new account way above.</p>
    </div>
</body>
</html>
